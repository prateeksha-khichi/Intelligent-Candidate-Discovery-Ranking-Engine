# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        
  - "Claude"

ai_usage_summary: |
  Used Gemini for coding assistance and debugging. Used Claude for validating the CSV outputs and rankings. No candidate data was fed to any LLM directly during the online ranking phase.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid semantic search and rule-based ranker. We retrieve the top 2000 candidates using a FAISS index on sentence-transformer embeddings, then pass them through a deterministic scoring engine. The engine applies an explicit job title blocklist to squash keyword stuffers (e.g., Mechanical Engineers listing "ML"), and then applies behavioral modifiers based on platform engagement and career trajectory (e.g., heavily weighting past senior production experience even if current title is junior).

