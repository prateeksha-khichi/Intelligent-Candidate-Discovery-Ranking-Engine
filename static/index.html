<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redrob Talent Intelligence</title>
    <meta name="description" content="AI-powered candidate ranking and gap analysis for HR professionals.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="glass-panel main-header">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <h1>Redrob Talent Intelligence</h1>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="ranking">Ranking</button>
                <button class="tab-btn" data-tab="memory">Talent Memory</button>
                <button class="tab-btn" data-tab="gap">Gap Analysis</button>
            </nav>
            <div class="controls">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <main class="content-area">
            <!-- Ranking Tab -->
            <section id="ranking" class="tab-content active">
                <div class="header-action">
                    <h2>Top 100 Candidates</h2>
                    <button class="primary-btn" onclick="fetchCandidates()">Load Candidates</button>
                </div>
                <div id="candidates-container" class="grid-container">
                    <!-- Cards will be populated here -->
                </div>
            </section>

            <!-- Talent Memory Tab -->
            <section id="memory" class="tab-content">
                <div class="search-section glass-panel">
                    <h2>Search Talent Pool Memory</h2>
                    <p>Enter a job description or query to find semantically similar candidates.</p>
                    <div class="search-bar">
                        <textarea id="memory-query" rows="3" placeholder="Paste Job Description or Query here..."></textarea>
                        <button class="primary-btn search-btn" onclick="searchMemory()">Search</button>
                    </div>
                </div>
                <div id="memory-results" class="results-container">
                    <!-- Results table/cards will go here -->
                </div>
            </section>

            <!-- Gap Analysis Tab -->
            <section id="gap" class="tab-content">
                <div class="header-action">
                    <h2>Talent Pool Gap Analysis</h2>
                    <button class="primary-btn" onclick="fetchGapAnalysis()">Generate Report</button>
                </div>
                <div id="gap-report" class="markdown-container glass-panel">
                    <!-- Markdown will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
